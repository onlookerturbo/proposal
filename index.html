<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Girlfriend?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  background: radial-gradient(circle at top left, #ff7aa2 0%, #111827 65%);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
  padding: 20px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 50px 35px;
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  max-width: 520px;
  width: 100%;
}

.heart{
  font-size: 58px;
  margin-bottom: 15px;
  animation: pulse 1.5s infinite;
}

h1{
  font-size: 42px;
  line-height: 1.2;
  margin-bottom: 15px;
}

p{
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 30px;
}

button{
  padding: 15px 32px;
  margin: 8px;
  border: none;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.yes{
  background: linear-gradient(135deg, #ff4f8b, #ff7aa2);
  color: white;
  box-shadow: 0 10px 25px rgba(255,79,139,0.45);
}

.yes:hover{
  transform: scale(1.08);
  box-shadow: 0 15px 35px rgba(255,79,139,0.6);
}

.no{
  background-color: rgba(255,255,255,0.12);
  color: white;
}

.no:hover{
  background-color: rgba(255,255,255,0.28);
  transform: scale(1.04);
}

footer{
  position: absolute;
  bottom: 20px;
  opacity: 0.7;
  font-size: 14px;
}

@keyframes pulse{
  0%{
    transform: scale(1);
  }
  50%{
    transform: scale(1.15);
  }
  100%{
    transform: scale(1);
  }
}
</style>
</head>

<body>

  <div class="card">
    <div class="heart">💖</div>

    <h1>Will you be my girlfriend?</h1>

    <p>
      You make my days brighter, my heart happier, and my world better.
    </p>

    <div>
      <button class="yes" onclick="window.location.href='yes.html'">
        YES 💍
      </button>

      <button class="no" onclick="window.location.href='think-again.html'">
        Бодож үзье 🥺
      </button>
    </div>
  </div>

  <footer>
    Made with ❤️ for Munkhzul
  </footer>

</body>
</html>
