<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сайн бодоорой ⏳</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  background: radial-gradient(circle at top right, #06d6a0 0%, #111827 70%);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
  padding: 20px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 50px 35px;
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  max-width: 540px;
  width: 100%;
}

.emoji{
  font-size: 58px;
  margin-bottom: 15px;
  animation: swing 2s ease-in-out infinite;
}

h1{
  font-size: 42px;
  line-height: 1.2;
  margin-bottom: 15px;
}

p{
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 30px;
}

button{
  padding: 15px 32px;
  margin: 8px;
  border: none;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.yes{
  background: linear-gradient(135deg, #ff4f8b, #ff7aa2);
  color: white;
  box-shadow: 0 10px 25px rgba(255,79,139,0.45);
}

.yes:hover{
  transform: scale(1.08);
  box-shadow: 0 15px 35px rgba(255,79,139,0.6);
}

.no{
  background-color: rgba(255,255,255,0.12);
  color: white;
  position: absolute;
}

.no:hover{
  background-color: rgba(255,255,255,0.28);
}

footer{
  position: absolute;
  bottom: 20px;
  opacity: 0.7;
  font-size: 14px;
}

@keyframes swing{
  0%{
    transform: rotate(0deg);
  }
  25%{
    transform: rotate(8deg);
  }
  50%{
    transform: rotate(0deg);
  }
  75%{
    transform: rotate(-8deg);
  }
  100%{
    transform: rotate(0deg);
  }
}

@media(max-width: 480px){
  h1{
    font-size: 34px;
  }

  p{
    font-size: 16px;
  }

  button{
    font-size: 16px;
    padding: 14px 26px;
  }
}
</style>
</head>

<body>

  <div class="card">
    <div class="emoji">⏳</div>

    <h1>Ийм хурдан бодчихлоо гэж үү?</h1>

    <p>
      Жаахан тайван бодоод үз дээ... зүрхнээсээ хариулаарай ❤️
    </p>

    <div>
      <button class="yes" onclick="window.location.href='yes.html'">
        За тэгье 💖
      </button>

      <button class="no" id="noBtn">
        Үгүй ээ 😢
      </button>
    </div>
  </div>

  <footer>
    Made with ❤️ for Munkhzul
  </footer>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton() {
  const padding = 20;
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;

  const x = Math.random() * (window.innerWidth - btnWidth - padding * 2) + padding;
  const y = Math.random() * (window.innerHeight - btnHeight - padding * 2) + padding;

  noBtn.style.left = `${x}px`;
  noBtn.style.top = `${y}px`;
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("touchstart", moveButton);

noBtn.addEventListener("click", () => {
  moveButton();
});
</script>

</body>
</html>
